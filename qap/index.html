<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rank-1 Constraint System (R1CS) & Quadratic Arithmetic Program (QAP)</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
            color: #333;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        h1 {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            padding: 16px 20px;
            margin: 0;
        }
        .section {
            padding: 16px 20px;
            border-bottom: 1px solid #eee;
        }
        .section:last-of-type { border-bottom: none; }
        .row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .row:last-child { margin-bottom: 0; }
        .exp-input {
            flex: 1;
            max-width: 400px;
            padding: 10px 14px;
            font-size: 14px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }
        .exp-input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 2px rgba(52,152,219,0.2);
        }
        button {
            padding: 10px 18px;
            font-size: 13px;
            font-weight: 500;
            background: #3498db;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #2980b9;
        }
        .three-cols {
            display: flex;
            gap: 16px;
            margin-top: 12px;
        }
        .col {
            flex: 1;
            min-width: 0;
        }
        textarea {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 12px;
            width: 100%;
            height: 150px;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            resize: vertical;
            background: #fafafa;
        }
        .three-cols textarea {
            height: 180px;
        }
        .witness-section {
            background: #fafbfc;
            padding: 20px;
            border-radius: 6px;
            border: 1px solid #e8eaed;
        }
        .witness-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #2c3e50;
        }
        .witness-inputs {
            display: flex;
            flex-wrap: nowrap;
            gap: 20px;
            align-items: flex-end;
            margin-bottom: 16px;
            overflow-x: auto;
            padding-bottom: 8px;
        }
        .witness-item {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 6px;
        }
        .witness-item label {
            font-size: 12px;
            font-weight: 600;
            color: #5a6c7d;
        }
        .witness-item input {
            width: 56px;
            padding: 8px 10px;
            font-size: 14px;
            text-align: center;
            border: 1px solid #ddd;
            border-radius: 6px;
        }
        .witness-item input:focus {
            outline: none;
            border-color: #3498db;
        }
        .witness-placeholder {
            font-size: 13px;
            color: #95a5a6;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Rank-1 Constraint System (R1CS) & Quadratic Arithmetic Program (QAP)</h1>
        <div class="section">
            <div class="row">
                <input type="text" class="exp-input" id="exp" placeholder="z=3*x^2+x+3">
                <button onclick="generateLRO()">Generate R1CS</button>
            </div>
            <textarea id="lro"></textarea>
        </div>
        <div class="section">
            <div class="three-cols">
                <div class="col"><textarea readonly id="lMatrix"></textarea></div>
                <div class="col"><textarea readonly id="rMatrix"></textarea></div>
                <div class="col"><textarea readonly id="oMatrix"></textarea></div>
            </div>
        </div>
        <div class="section witness-section">
            <div class="witness-title">Witness vector</div>
            <div id="witnessContainer" class="witness-inputs"></div>
            <div class="witness-placeholder" id="witnessPlaceholder">Nhập biểu thức và bấm "Generate R1CS" để tạo các ô nhập witness.</div>
            <div class="row" style="margin-top: 12px;">
                <button onclick="generateQAP()">Generate QAP (prime order p = 47)</button>
            </div>
        </div>
        <div class="section">
            <div class="three-cols">
                <div class="col"><textarea readonly id="lPoly"></textarea></div>
                <div class="col"><textarea readonly id="rPoly"></textarea></div>
                <div class="col"><textarea readonly id="oPoly"></textarea></div>
            </div>
        </div>
        <div class="section">
            <textarea readonly id="hx"></textarea>
        </div>
    </div>
    <script src="exp-r1cs.js"></script>    
    <script src="discrete-polynomial.js"></script>
    <script src="discrete-qap.js"></script>    
    <script>
        function generateLRO() {
            const exp = document.getElementById('exp').value;
            const lro = exp2LROmatrices(exp);
            document.getElementById('lro').value = lro.equations.join('\n');
            document.getElementById('lMatrix').value = `Left polynomials with witness [${lro.variables.join(',')}]:\n${lro.L.join('\n')}`;
            document.getElementById('rMatrix').value = `Right polynomials with witness [${lro.variables.join(',')}]:\n${lro.R.join('\n')}`;
            document.getElementById('oMatrix').value = `Output polynomials with witness [${lro.variables.join(',')}]:\n${lro.O.join('\n')}`;

            // Create witness input boxes - one per variable
            const container = document.getElementById('witnessContainer');
            const placeholder = document.getElementById('witnessPlaceholder');
            container.innerHTML = '';
            placeholder.style.display = 'none';

            lro.variables.forEach((v, i) => {
                const item = document.createElement('div');
                item.className = 'witness-item';
                item.innerHTML = `
                    <label for="witness_${i}">${v}</label>
                    <input type="text" id="witness_${i}" placeholder="0" data-index="${i}">
                `;
                container.appendChild(item);
            });
        }
        function generateQAP() {
            const exp = document.getElementById('exp').value;
            const lro = exp2LROmatrices(exp);
            const firstInput = document.getElementById('witness_0');
            if (!firstInput) {
                alert('Vui lòng bấm "Generate R1CS" trước để tạo các ô nhập witness.');
                return;
            }
            const witness = lro.variables.map((_, i) => {
                const inp = document.getElementById(`witness_${i}`);
                return inp ? (parseInt(inp.value) || 0) : 0;
            });
            const prime = 47;

            const lps = interPolyMatrix(lro.L);
            const lp = computePoly(lps, witness, prime);

            document.getElementById('lPoly').value = `Left interpolated polynomials:\n${lps.map((p,i) => `l${i}(x)= ${p}`).join('\n')}`;
            document.getElementById('lPoly').value += `\n--------\n`;
            document.getElementById('lPoly').value += `l(x)= ${lp}`;

            const rps = interPolyMatrix(lro.R);
            const rp = computePoly(rps, witness, prime);
            document.getElementById('rPoly').value = `Right interpolated polynomials:\n${rps.map((p,i) => `r${i}(x)= ${p}`).join('\n')}`;
            document.getElementById('rPoly').value += `\n--------\n`;
            document.getElementById('rPoly').value += `r(x)= ${rp}`;

            const ops = interPolyMatrix(lro.O);
            const op = computePoly(ops, witness, prime);
            document.getElementById('oPoly').value = `Output interpolated polynomials:\n${ops.map((p,i) => `o${i}(x)= ${p}`).join('\n')}`;
            document.getElementById('oPoly').value += `\n--------\n`;
            document.getElementById('oPoly').value += `o(x)= ${op}`;

            const lr = field.polyMul(lp, rp);
            document.getElementById('hx').value = `l(x)r(x) = ${lr}`;

            const t = generateT(lro.L.length);
            document.getElementById('hx').value += `\n--------\n`;
            document.getElementById('hx').value += `t(x)= ${t}`;

            const b = field.polyMinus(lr, op);
            document.getElementById('hx').value += `\n--------\n`;
            document.getElementById('hx').value += `b(x)= ${b}`;

            const h = field.polyDiv(b, t);
            document.getElementById('hx').value += `\n--------\n`;
            document.getElementById('hx').value += `h(x)= ${h.quotient}\n`;
            document.getElementById('hx').value += `remainder = ${h.remainder}`;
        }
    </script>
</body>
</html>
