<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convert an Expression to Rank 1 Constraint System</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
            color: #333;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        h1 {
            background: linear-gradient(135deg, #28a745 0%, #218838 100%);
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            padding: 16px 20px;
            margin: 0;
        }
        .section {
            padding: 20px;
        }
        .row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .exp-input {
            flex: 1;
            max-width: 400px;
            padding: 10px 14px;
            font-size: 14px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }
        .exp-input:focus {
            outline: none;
            border-color: #28a745;
            box-shadow: 0 0 0 2px rgba(40,167,69,0.2);
        }
        button {
            padding: 10px 18px;
            font-size: 13px;
            font-weight: 500;
            background: #28a745;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #218838;
        }
        textarea {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            width: 100%;
            min-height: 280px;
            padding: 14px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            resize: vertical;
            background: #fafafa;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Expression to Rank 1 Constraint System</h1>
        <div class="section">
            <div class="row">
                <input type="text" class="exp-input" id="exp" placeholder="z=x^3+y+5">
                <button onclick="convert()">Convert</button>
            </div>
            <textarea id="result" readonly></textarea>
        </div>
    </div>
    <script src="index.js"></script>    
    <script>
        function convert() {
            const exp = document.getElementById("exp").value;
            const result = document.getElementById("result");

            let r1cs = exp2r1cs(exp);
            result.value = 'Rank 1 Constraint System:\n';
            r1cs.equations.forEach(r => result.value += r + '\n');
            result.value += '-----------------------------------\n';

            let lro = exp2LROmatrices(exp);
            let m = lro.L.length;
            for (let i=0; i < m; i++) {
                result.value += `Equation ${i}: ${r1cs.equations[i]}, Variables List: ${Array.from(r1cs.variables).join(', ')}\n`;
                result.value += `L[${i}]: ${lro.L[i].join(' ')}\n`;
                result.value += `R[${i}]: ${lro.R[i].join(' ')}\n`;
                result.value += `O[${i}]: ${lro.O[i].join(' ')}\n`;
                result.value += '-----------------------------------\n';
            }
        }
    </script>
</body>
</html>
