<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discrete Fourier Transform — Draw &amp; reconstruct</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../rh/style.css">
    <style>
        .visual-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 24px;
        }

        @media (max-width: 820px) {
            .visual-row {
                grid-template-columns: 1fr;
            }
        }

        .chart-container--draw,
        .chart-container--play {
            margin-top: 0;
            height: min(420px, 55vh);
            min-height: 280px;
            border-radius: 12px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--border-color);
        }

        .chart-container--draw canvas,
        .chart-container--play canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .panel-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
            letter-spacing: 0.02em;
        }

        .hint-bar {
            margin-top: 16px;
            padding: 12px 14px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            font-size: 0.9rem;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
        }

        .top-links {
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .top-links a {
            color: var(--accent-color);
            text-decoration: none;
        }

        .top-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="container">

        <header>
            <h1>DFT — Draw &amp; reconstruct</h1>
        </header>

        <div class="card">
            <div class="hint-bar">
                Click in the draw panel, drag to sketch, release to compute the DFT and play it back on the right. Drawing again clears and starts over.
            </div>

            <div class="visual-row">
                <div>
                    <div class="panel-label">Draw</div>
                    <div class="chart-container chart-container--draw" id="dft-draw-host"></div>
                </div>
                <div>
                    <div class="panel-label">Reconstruction (epicycles + path)</div>
                    <div class="chart-container chart-container--play" id="dft-play-host"></div>
                </div>
            </div>
        </div>

        <footer style="text-align: center; margin-top: 2rem; color: var(--text-muted); font-size: 0.875rem;">
            DFT demo — Legos Writing Demos
        </footer>
    </div>

    <script src="dft.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="sketch.js"></script>
</body>

</html>
