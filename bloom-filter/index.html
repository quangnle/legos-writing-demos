<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloom Filter Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0c0c0f;
            --surface: #16161a;
            --surface-alt: #1e1e24;
            --border: #2a2a32;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --hit: #22c55e;
            --hit-bg: rgba(34, 197, 94, 0.15);
            --miss: #ef4444;
            --miss-bg: rgba(239, 68, 68, 0.15);
            --text: #f4f4f5;
            --text-muted: #a1a1aa;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            font-size: 16px;
            margin: 0;
            padding: 2rem;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }
        .container { max-width: 1100px; margin: 0 auto; }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }
        header h1 {
            margin: 0;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #fff 40%, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        header p {
            margin: 0.75rem 0 0;
            color: var(--text-muted);
            font-size: 1.05rem;
        }
        header p b {
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent);
            font-weight: 500;
        }

        .control-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .control-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            align-items: center;
        }
        .control-row input {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            padding: 0.65rem 1rem;
            width: 240px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface-alt);
            color: var(--text);
        }
        .control-row input::placeholder { color: var(--text-muted); }
        .control-row input:focus {
            outline: none;
            border-color: var(--accent);
        }
        .control-row button {
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            padding: 0.65rem 1.25rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .control-row button#add {
            background: var(--accent);
            color: white;
        }
        .control-row button#add:hover { background: var(--accent-hover); }
        .control-row button#check {
            background: var(--surface-alt);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .control-row button#check:hover {
            background: var(--border);
        }
        #msg {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.05rem;
            color: var(--text-muted);
            margin-left: 0.5rem;
        }

        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        @media (max-width: 900px) {
            .content-grid { grid-template-columns: 1fr; }
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
        }
        .card h3 {
            margin: 0 0 1rem;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-muted);
        }
        .hash-line {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            margin-bottom: 0.5rem;
            color: var(--text);
        }
        .hash-line b { color: var(--accent); }

        .filter-card {
            grid-column: 1 / -1;
            overflow-x: auto;
        }
        .filter-card h3 { margin-bottom: 1.25rem; }

        .items-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .items-list li {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            padding: 0.4rem 0;
            border-bottom: 1px solid var(--border);
        }
        .items-list li:last-child { border-bottom: none; }

        .bloom-table {
            border-collapse: collapse;
            width: 100%;
            font-family: 'JetBrains Mono', monospace;
        }
        .bloom-table th, .bloom-table td {
            padding: 0.4rem;
            min-width: 2rem;
            text-align: center;
            font-size: 0.95rem;
            font-weight: 500;
            border: 1px solid var(--border);
            background: var(--surface-alt);
        }
        .bloom-table th {
            font-size: 0.85rem;
            color: var(--text-muted);
            width: 2.5rem;
        }
        .bloom-table td.bit-cell {
            font-size: 1.05rem;
            min-width: 2.2rem;
            padding: 0.5rem;
        }
        .bloom-table td.hit {
            background: var(--hit-bg);
            color: var(--hit);
        }
        .bloom-table td.miss {
            background: var(--miss-bg);
            color: var(--miss);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Bloom Filter Demo</h1>
            <p>Hash functions: <b>murmur</b>, <b>fnv1s</b></p>
        </header>

        <div class="control-card">
            <div class="control-row">
                <input type="text" id="input" placeholder="Enter a value">
                <button id="add" onclick="addItem()">Add</button>
                <button id="check" onclick="checkItem()">Check</button>
                <span id="msg"></span>
            </div>
        </div>

        <div class="content-grid">
            <div class="card">
                <h3>Hash Values</h3>
                <div class="hash-line"><b>Hash 1:</b> <span id="hash1">—</span></div>
                <div class="hash-line"><b>Hash 2:</b> <span id="hash2">—</span></div>
            </div>
            <div class="card">
                <h3>Items in Filter</h3>
                <ul id="items" class="items-list"></ul>
            </div>
        </div>

        <div class="card filter-card">
            <h3>Bloom Filter Bits</h3>
            <div id="filter"></div>
        </div>
    </div>
    <script src="murmur.js"></script>
    <script src="fnv1s.js"></script>
    <script>
        const hash1 = new murmur();
        const hash2 = new fnv1s();        
        const items = [];
        const FILTER_SIZE = 20;

        let filter = new Array(FILTER_SIZE).fill(0);

        function generateFilterTable(element, idx1, idx2) {            
            element.innerHTML = '';
            const table = document.createElement('table');
            table.className = 'bloom-table';

            // indices row
            const tr1 = document.createElement('tr');
            const th1 = document.createElement('th');
            th1.appendChild(document.createTextNode('Index'));
            tr1.appendChild(th1);
            for (let i = 0; i < FILTER_SIZE; i++) {
                const td = document.createElement('td');
                if (i === idx1 || i === idx2) {
                    td.className = filter[i] === 0 ? 'miss' : 'hit';
                }
                td.appendChild(document.createTextNode(i));
                tr1.appendChild(td);
            }
            table.appendChild(tr1);

            // bits row
            const tr2 = document.createElement('tr');
            const th2 = document.createElement('th');
            th2.appendChild(document.createTextNode('Bits'));
            tr2.appendChild(th2);
            for (let i = 0; i < FILTER_SIZE; i++) {
                const td = document.createElement('td');
                td.className = 'bit-cell';
                if (i === idx1 || i === idx2) {
                    td.className += filter[i] === 0 ? ' miss' : ' hit';
                }
                td.appendChild(document.createTextNode(filter[i]));
                tr2.appendChild(td);
            }
            table.appendChild(tr2);
            element.appendChild(table);
        }

        function updateFilter(idx1, idx2) {
            filter[idx1] = 1;
            filter[idx2] = 1;
        }

        function calculateIndices(item) {
            const hash1Value = hash1.hash(item);
            const hash2Value = hash2.hash(item);
            const hash1Index = hash1Value % FILTER_SIZE;
            const hash2Index = hash2Value % FILTER_SIZE;
            return [hash1Value, hash1Index, hash2Value, hash2Index];
        }

        function displayHashes(item, hash1Value, hash1Index, hash2Value, hash2Index) {
            const hash1Element = document.getElementById('hash1');
            const hash2Element = document.getElementById('hash2');
            hash1Element.innerHTML = `H1('${item}') = ${hash1Value} %${FILTER_SIZE} = ${hash1Index}`;
            hash2Element.innerHTML = `H2('${item}') = ${hash2Value} %${FILTER_SIZE} = ${hash2Index}`;
        }

        function displayFilter(item) {   
            const filterElement = document.getElementById('filter');
            if (!item) {
                generateFilterTable(filterElement, -1, -1);
                return;
            }

            const [hash1Value, hash1Index, hash2Value, hash2Index] = calculateIndices(item);
            updateFilter(hash1Index, hash2Index);

            displayHashes(item, hash1Value, hash1Index, hash2Value, hash2Index);
            generateFilterTable(filterElement, hash1Index, hash2Index);
        }

        function checkItem() {
            const input = document.getElementById('input');
            const item = input.value;
            if (!item) {
                return;
            }

            const filterElement = document.getElementById('filter');

            const [hash1Value, hash1Index, hash2Value, hash2Index] = calculateIndices(item);
            displayHashes(item, hash1Value, hash1Index, hash2Value, hash2Index);
            generateFilterTable(filterElement, hash1Index, hash2Index);

            const msg = document.getElementById('msg');
            if (filter[hash1Index] === 0 || filter[hash2Index] === 0) {
                msg.innerHTML = `Item '${item}' is not in the list.`;
            } else {
                msg.innerHTML = `Item '${item}' is probably in the list.`;
            }
        }

        function addItemIntoList(item) {
            items.push(item);
            
            const list = document.getElementById('items');
            list.innerHTML = ''; // remove all children

            // add all items
            for (let i = 0; i < items.length; i++) {
                const li = document.createElement('li');
                li.appendChild(document.createTextNode(items[i]));
                list.appendChild(li);
            }
        }

        function addItem() {
            const input = document.getElementById('input');
            if (!input.value) {
                return;
            }

            displayFilter(input.value);
            addItemIntoList(input.value);
            const msg = document.getElementById('msg');
            msg.innerHTML = `Item '${input.value}' added.`;
            input.value = '';
        }

        // Initial render
        displayFilter(null);
    </script>
</body>
</html>
