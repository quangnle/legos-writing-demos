<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Means Clustering Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0c0c0f;
            --surface: #16161a;
            --surface-alt: #1e1e24;
            --border: #2a2a32;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --text: #f4f4f5;
            --text-muted: #a1a1aa;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            font-size: 16px;
            margin: 0;
            padding: 2rem;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }
        .container { max-width: 900px; margin: 0 auto; }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }
        header h1 {
            margin: 0;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #fff 40%, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        header p {
            margin: 0.75rem 0 0;
            color: var(--text-muted);
            font-size: 1.05rem;
        }
        header p b {
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent);
            font-weight: 500;
        }

        .control-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .control-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
        }
        .control-row label {
            font-size: 0.95rem;
            color: var(--text-muted);
        }
        .control-row .slider-wrap {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .control-row input[type="range"] {
            width: 160px;
            height: 6px;
            -webkit-appearance: none;
            appearance: none;
            background: var(--surface-alt);
            border-radius: 3px;
            outline: none;
        }
        .control-row input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            transition: transform 0.15s;
        }
        .control-row input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }
        .control-row #valueOutput {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent);
            min-width: 1.5rem;
        }
        .control-row button {
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            padding: 0.65rem 1.25rem;
            border: none;
            border-radius: 8px;
            background: var(--accent);
            color: white;
            cursor: pointer;
            transition: background 0.2s;
        }
        .control-row button:hover {
            background: var(--accent-hover);
        }
        .control-row button.btn-secondary {
            background: var(--surface-alt);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .control-row button.btn-secondary:hover {
            background: var(--border);
        }
        .control-row .hint {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-style: italic;
        }

        .canvas-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            overflow: hidden;
        }
        .canvas-card h3 {
            margin: 0 0 1rem;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-muted);
        }
        #canvas-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--surface-alt);
            border-radius: 8px;
            padding: 0.5rem;
        }
        #canvas-wrapper canvas {
            border-radius: 6px;
            display: block;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s, visibility 0.2s;
        }
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            max-width: 700px;
            width: 90%;
            max-height: 90vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
        }
        .modal-header h2 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 600;
        }
        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0 0.5rem;
            line-height: 1;
        }
        .modal-close:hover { color: var(--text); }
        .modal-tabs {
            display: flex;
            gap: 0;
            padding: 0 1.5rem;
            border-bottom: 1px solid var(--border);
        }
        .modal-tab {
            padding: 1rem 1.25rem;
            background: none;
            border: none;
            color: var(--text-muted);
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
        }
        .modal-tab:hover { color: var(--text); }
        .modal-tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }
        .modal-body {
            padding: 1.5rem;
            overflow-y: auto;
        }
        .tab-panel {
            display: none;
        }
        .tab-panel.active { display: block; }
        .tab-panel .result-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            color: var(--accent);
            margin-bottom: 1rem;
        }
        .tab-panel .result-badge span { color: #22c55e; font-weight: 600; }
        .tab-panel .chart-container {
            height: 300px;
            position: relative;
        }
        .tab-panel canvas { width: 100% !important; height: 300px !important; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>K-Means Clustering Demo</h1>
            <p>Clustering algorithm: <b>p5.js</b></p>
        </header>

        <div class="control-card">
            <div class="control-row">
                <label for="slider">Number of clusters</label>
                <div class="slider-wrap">
                    <input type="range" id="slider" min="1" max="10" value="1">
                    <span id="valueOutput">1</span>
                </div>
                <button onclick="clusterIt()">Cluster</button>
                <button class="btn-secondary" onclick="openMetricsModal()">Find Optimal K</button>
                <span class="hint">Click on the canvas to add more points</span>
            </div>
        </div>

        <div class="canvas-card">
            <h3>Interactive Canvas</h3>
            <div id="canvas-wrapper">
                <div id="canvas-container"></div>
            </div>
        </div>
    </div>

    <div id="metrics-modal" class="modal-overlay" onclick="if(event.target===this) closeMetricsModal()">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2>Find Optimal K</h2>
                <button class="modal-close" onclick="closeMetricsModal()">&times;</button>
            </div>
            <div class="modal-tabs">
                <button id="tab-wcss" class="modal-tab active" onclick="switchTab('wcss')">WCSS / Elbow</button>
                <button id="tab-silhouette" class="modal-tab" onclick="switchTab('silhouette')">Silhouette</button>
                <button id="tab-gap" class="modal-tab" onclick="switchTab('gap')">Gap Statistic</button>
            </div>
            <div class="modal-body">
                <div id="panel-wcss" class="tab-panel active">
                    <div class="result-badge">Best k (Elbow): <span id="wcss-best">—</span></div>
                    <div class="chart-container"><canvas id="chart-wcss"></canvas></div>
                </div>
                <div id="panel-silhouette" class="tab-panel">
                    <div class="result-badge">Best k (max Silhouette): <span id="sil-best">—</span></div>
                    <div class="chart-container"><canvas id="chart-silhouette"></canvas></div>
                </div>
                <div id="panel-gap" class="tab-panel">
                    <div class="result-badge">Best k (Gap Statistic): <span id="gap-best">—</span></div>
                    <div class="chart-container"><canvas id="chart-gap"></canvas></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('slider').oninput = function() {
            document.getElementById('valueOutput').textContent = this.value;
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.2/lib/p5.js"></script>
    <script src="sketch.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="k-metrics.js"></script>
</body>
</html>
